<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KofiFX — Position Sizing Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            deep:    '#0b0c1e',
            surface: '#12132a',
            panel:   '#0f1024',
            hover:   '#1a1b35',
            'b':     '#1e2040',
            'bl':    '#272860',
            accent:  '#7c3aed',
            muted:   '#8590b8',
            bull:    '#00d68f',
            bear:    '#f43f5e',
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0b0c1e;
      color: #e8e9f8;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Custom input skin ── */
    .fx-input {
      display: block;
      width: 100%;
      background: #0f1024;
      border: 1px solid #1e2040;
      color: #e8e9f8;
      border-radius: 5px;
      padding: 7px 10px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.14s, box-shadow 0.14s;
      -moz-appearance: textfield;
    }
    .fx-input:focus {
      outline: none;
      border-color: #7c3aed;
      box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.10);
    }
    .fx-input::placeholder { color: #3a3b6a; }
    .fx-input::-webkit-outer-spin-button,
    .fx-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    select.fx-input option { background: #12132a; color: #e8e9f8; }
    select.fx-input optgroup { color: #7c3aed; font-size: 11px; }

    .fx-input.sl-field:focus  { border-color: #f43f5e; box-shadow: 0 0 0 2px rgba(255,69,96,0.10); }
    .fx-input.tp-field:focus  { border-color: #00d68f; box-shadow: 0 0 0 2px rgba(0,201,122,0.10); }
    .fx-input.sl-field.has-val { border-color: rgba(255,69,96,0.45); }
    .fx-input.tp-field.has-val { border-color: rgba(0,201,122,0.45); }

    /* ── Section / card chrome ── */
    .fx-card {
      background: #12132a;
      border: 1px solid #1e2040;
      border-radius: 8px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .fx-card:hover { border-color: #272860; }

    /* ── Micro label ── */
    .fx-lbl {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #8590b8;
      margin-bottom: 6px;
    }
    .fx-lbl.bear { color: #f43f5e; }
    .fx-lbl.bull { color: #00d68f; }

    /* ── Output stat cells ── */
    .stat-val {
      font-size: 20px;
      font-weight: 700;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      line-height: 1.1;
      color: #e8e9f8;
    }
    .stat-val.sl  { color: #f43f5e; }
    .stat-val.tp  { color: #00d68f; }
    .stat-val.rr  { color: #7c3aed; font-size: 16px; }
    .stat-val.dim { color: #8590b8; }

    /* ── Big lot size ── */
    .lot-big {
      font-size: 32px;
      font-weight: 800;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      color: #7c3aed;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    @keyframes lot-pulse {
      0%   { color: #7c3aed; }
      40%  { color: #00ffcc; text-shadow: 0 0 8px rgba(0,255,200,0.5); }
      100% { color: #7c3aed; text-shadow: none; }
    }
    .lot-flash { animation: lot-pulse 0.35s ease; }

    /* ── Direction badge ── */
    .dir-badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid transparent;
      transition: all 0.12s;
    }
    .dir-long  { background: rgba(0,201,122,0.12); border-color: #00d68f; color: #00d68f; }
    .dir-short { background: rgba(255,69,96,0.12);  border-color: #f43f5e; color: #f43f5e; }
    .dir-none  { background: #0f1024; border-color: #1e2040; color: #4a4f7a; }

    /* ── Warning badge ── */
    .warn-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      background: rgba(255,165,0,0.12);
      border: 1px solid rgba(255,165,0,0.4);
      color: #ffa500;
      letter-spacing: 0.04em;
    }

    /* ── Remove button ── */
    .remove-btn {
      background: none;
      border: none;
      color: #3a3b6a;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 3px 5px;
      border-radius: 3px;
      transition: color 0.12s, background 0.12s;
    }
    .remove-btn:hover { color: #f43f5e; background: rgba(255,69,96,0.10); }

    /* ── Add button ── */
    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #7c3aed;
      color: #0b0c1e;
      border: none;
      border-radius: 5px;
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.14s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .add-btn:hover  { background: #5b21b6; }
    .add-btn:active { transform: scale(0.97); }

    /* ── Divider ── */
    .fx-divider { border: none; border-top: 1px solid #1e2040; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #0b0c1e; }
    ::-webkit-scrollbar-thumb { background: #1e2040; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #272860; }

    /* ── Pill tab ── */
    .pip-note {
      font-size: 10px;
      color: #3a3b6a;
      font-style: italic;
      transition: color 0.2s;
    }

    /* ── Remove animation ── */
    .card-removing {
      opacity: 0;
      transform: scale(0.97) translateY(-4px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    /* ── Summary stat ── */
    .sum-stat { border-right: 1px solid #1e2040; padding: 0 20px; }
    .sum-stat:first-child { padding-left: 0; }
    .sum-stat:last-child  { border-right: none; }

    /* ── Input mode toggle (Price / Pips) ── */
    .input-mode-toggle {
      display: inline-flex;
      background: #0b0c1e;
      border: 1px solid #1e2040;
      border-radius: 6px;
      overflow: hidden;
    }
    .mode-btn {
      background: transparent;
      border: none;
      color: #4a4f7a;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .mode-btn:hover { color: #8590b8; }
    .mode-btn.mode-active {
      background: #7c3aed;
      color: #fff;
    }

    /* ── Direction toggle (Long / Short) shown in pips mode ── */
    .dir-toggle {
      display: inline-flex;
      background: #0b0c1e;
      border: 1px solid #1e2040;
      border-radius: 6px;
      overflow: hidden;
    }
    .dir-toggle.hidden { display: none; }
    .dir-btn {
      background: transparent;
      border: none;
      color: #4a4f7a;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .dir-btn.dir-active-long  { background: #00d68f22; color: #00d68f; }
    .dir-btn.dir-active-short { background: #f43f5e22; color: #f43f5e; }

    /* ── Live pips badge beneath SL/TP price inputs ── */
    .pips-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .03em;
      margin-top: 4px;
      min-height: 14px;
      transition: opacity .15s;
    }
    .pips-badge.bear { color: #f43f5e; }
    .pips-badge.bull { color: #00d68f; }

    /* ── Derived price badge shown in pips mode ── */
    .price-badge {
      display: none;
      font-size: 10px;
      font-weight: 600;
      margin-top: 4px;
      min-height: 14px;
      color: #7c3aed;
    }
  </style>
</head>

<body>

<!-- ═══════════════════  TOP BAR  ════════════════════════════════════════════ -->
<header style="background:#12132a; border-bottom:1px solid #1e2040; height:52px;
               display:flex; align-items:center; padding:0 20px; gap:14px;
               position:sticky; top:0; z-index:50;">

  <!-- Brand -->
  <div style="display:flex; align-items:center; gap:9px; flex-shrink:0;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <polyline points="2,18 8,10 13,14 22,4" stroke="#7c3aed" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="16,4 22,4 22,10"       stroke="#7c3aed" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span style="font-weight:700; font-size:14px; white-space:nowrap;">
      KofiFX <span style="color:#7c3aed;">Terminal</span>
    </span>
    <span style="color:#272860; margin:0 2px;">│</span>
    <span style="color:#8590b8; font-size:12px; white-space:nowrap;">Position Sizing Dashboard</span>
  </div>

  <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">
    <!-- Market clock placeholder -->
    <span id="topClock" style="font-family:monospace; font-size:12px; color:#4a4f7a;"></span>
    <!-- Back link -->
    <a href="/macro"
       style="color:#8590b8; font-size:11px; font-weight:600; text-decoration:none;
              display:flex; align-items:center; gap:5px; padding:5px 12px;
              border-radius:4px; border:1px solid #1e2040; letter-spacing:0.03em;
              transition:all 0.14s; margin-right:6px;"
       onmouseover="this.style.borderColor='#7c3aed';this.style.color='#7c3aed'"
       onmouseout="this.style.borderColor='#1e2040';this.style.color='#8590b8'">
      Macro
    </a>
    <a href="/" id="backLink"
       style="color:#8590b8; font-size:11px; font-weight:600; text-decoration:none;
              display:flex; align-items:center; gap:5px; padding:5px 12px;
              border-radius:4px; border:1px solid #1e2040; letter-spacing:0.03em;
              transition:all 0.14s;"
       onmouseover="this.style.borderColor='#7c3aed';this.style.color='#7c3aed'"
       onmouseout="this.style.borderColor='#1e2040';this.style.color='#8590b8'">
      ← Charts
    </a>
  </div>
</header>

<!-- ═══════════════════  MAIN CONTENT  ═══════════════════════════════════════ -->
<main style="max-width:1280px; margin:0 auto; padding:24px 20px 60px;">

  <!-- ── GLOBAL SETTINGS ──────────────────────────────────────────────────── -->
  <section class="fx-card" style="padding:20px 22px; margin-bottom:22px;">

    <div style="font-size:10px; font-weight:700; letter-spacing:0.10em;
                text-transform:uppercase; color:#8590b8; margin-bottom:18px;">
      Account Settings
    </div>

    <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:18px; align-items:end;">

      <!-- Balance -->
      <div>
        <label class="fx-lbl" for="gBalance">Account Balance</label>
        <div style="position:relative;">
          <span style="position:absolute; left:9px; top:50%; transform:translateY(-50%);
                       color:#8590b8; pointer-events:none;">$</span>
          <input id="gBalance" type="number" class="fx-input" value="10000"
                 min="100" step="500" style="padding-left:20px;" oninput="recalcAll()"/>
        </div>
      </div>

      <!-- Risk % -->
      <div>
        <label class="fx-lbl" for="gRisk">Risk Percentage</label>
        <div style="position:relative;">
          <input id="gRisk" type="number" class="fx-input" value="2"
                 min="0.1" max="20" step="0.1" style="padding-right:22px;" oninput="recalcAll()"/>
          <span style="position:absolute; right:9px; top:50%; transform:translateY(-50%);
                       color:#8590b8; pointer-events:none;">%</span>
        </div>
      </div>

      <!-- USD/JPY rate (used for all JPY cross calculations) -->
      <div>
        <label class="fx-lbl" for="gUSDJPY">USD / JPY Rate <span style="font-weight:400;opacity:0.7;">(for JPY pairs)</span></label>
        <input id="gUSDJPY" type="number" class="fx-input" value="150.00"
               min="50" max="300" step="0.01" oninput="recalcAll()" placeholder="e.g. 150.50"/>
      </div>

      <!-- Cash at Risk card -->
      <div style="background:#0f1024; border:1px solid #272860; border-radius:6px;
                  padding:12px 15px; min-width:0;">
        <div style="font-size:10px; font-weight:600; letter-spacing:0.06em;
                    text-transform:uppercase; color:#8590b8; margin-bottom:5px;">
          Cash at Risk
        </div>
        <div id="gCashRisk"
             style="font-size:26px; font-weight:800; font-family:monospace;
                    color:#f43f5e; line-height:1;">$200.00</div>
        <div id="gRiskNote"
             style="font-size:10px; color:#4a4f7a; margin-top:4px;">2.00% of $10,000</div>
      </div>

    </div>
  </section>

  <!-- ── SETUPS HEADER ─────────────────────────────────────────────────────── -->
  <div style="display:flex; align-items:center; justify-content:space-between;
              margin-bottom:14px;">
    <div>
      <span style="font-size:13px; font-weight:600;">Active Setups</span>
      <span id="setupCounter"
            style="margin-left:8px; font-size:11px; color:#8590b8; font-family:monospace;"></span>
    </div>
    <button class="add-btn" onclick="addSetup()">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
        <line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Add Setup
    </button>
  </div>

  <!-- ── SETUP CARDS GRID ──────────────────────────────────────────────────── -->
  <div id="setupsGrid"
       style="display:grid; grid-template-columns:repeat(auto-fill,minmax(500px,1fr)); gap:16px;">
    <!-- Injected by JS -->
  </div>

  <!-- ── EMPTY STATE ────────────────────────────────────────────────────────── -->
  <div id="emptyState"
       style="display:none; text-align:center; padding:60px 20px; color:#3a3b6a;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
         style="margin:0 auto 16px; display:block; opacity:0.3;">
      <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
      <line x1="12" y1="8" x2="12" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8"  y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <p style="font-size:14px; margin-bottom:8px;">No setups yet</p>
    <p style="font-size:12px;">Click <strong style="color:#7c3aed;">Add Setup</strong> to start calculating</p>
  </div>

  <!-- ── PORTFOLIO SUMMARY ─────────────────────────────────────────────────── -->
  <section id="summarySection"
           style="display:none; margin-top:22px;"
           class="fx-card">
    <div style="padding:16px 22px; border-bottom:1px solid #1e2040; font-size:10px;
                font-weight:700; letter-spacing:0.10em; text-transform:uppercase; color:#8590b8;">
      Portfolio Summary
    </div>
    <div style="padding:16px 22px; display:flex; flex-wrap:wrap; gap:0;">
      <div class="sum-stat">
        <div class="fx-lbl">Setups</div>
        <div class="stat-val" id="sumSetups" style="font-size:24px;">0</div>
      </div>
      <div class="sum-stat">
        <div class="fx-lbl">Total Lot Size</div>
        <div class="stat-val" id="sumLots"
             style="font-size:24px; color:#7c3aed;">0.00</div>
      </div>
      <div class="sum-stat">
        <div class="fx-lbl">Total Cash Risk</div>
        <div class="stat-val" id="sumRisk"
             style="font-size:24px; color:#f43f5e;">$0.00</div>
      </div>
      <div class="sum-stat">
        <div class="fx-lbl">% of Account</div>
        <div class="stat-val" id="sumPct" style="font-size:24px;">0.00%</div>
      </div>
      <div class="sum-stat" style="border-right:none; flex:1; min-width:160px;">
        <div class="fx-lbl">Risk Level</div>
        <div id="sumLevel" class="stat-val" style="font-size:18px;">—</div>
      </div>
    </div>
  </section>

</main><!-- /main -->

<!-- ═══════════════════  JAVASCRIPT  ═════════════════════════════════════════ -->
<script>
'use strict';

// ── Pair groups & options ────────────────────────────────────────────────────
const PAIR_GROUPS = {
  'Majors': [
    'EUR/USD','GBP/USD','AUD/USD','NZD/USD',
    'USD/JPY','USD/CAD','USD/CHF',
  ],
  'JPY Crosses': [
    'EUR/JPY','GBP/JPY','AUD/JPY','CAD/JPY','CHF/JPY','NZD/JPY',
  ],
  'EUR Crosses': [
    'EUR/GBP','EUR/CAD','EUR/CHF','EUR/AUD','EUR/NZD',
  ],
  'GBP Crosses': [
    'GBP/CAD','GBP/CHF','GBP/AUD','GBP/NZD',
  ],
  'AUD Crosses': [
    'AUD/CAD','AUD/CHF','AUD/NZD',
  ],
  'CAD / NZD Crosses': [
    'CAD/CHF','NZD/CAD','NZD/CHF',
  ],
  'Metals': [
    'XAU/USD',
    'XAG/USD',        // Silver
  ],
  'Indices': [
    'US100',          // Nasdaq 100
    'NAS100',         // Nasdaq 100 (alias)
    'US30',           // Dow Jones 30
    'SP500',          // S&P 500
    'GER40',          // DAX
  ],
  'Crypto': [
    'BTC/USDT',       // Bitcoin
    'ETH/USDT',       // Ethereum
    'BTC/USD',
    'ETH/USD',
  ],
};

const DEFAULT_PAIRS = [
  'AUD/USD','GBP/USD','AUD/JPY','USD/JPY',
  'CAD/JPY','USD/CHF','GBP/USD','USD/CAD',
  'NZD/JPY','AUD/CAD','GBP/JPY','GBP/CAD',
  'AUD/CHF','CAD/CHF','AUD/NZD','GBP/NZD',
];

// ── Build <optgroup> HTML for pair selector ──────────────────────────────────
function buildPairOpts(selected) {
  return Object.entries(PAIR_GROUPS).map(([g, pairs]) =>
    `<optgroup label="${g}">${pairs.map(p =>
      `<option value="${p}"${p === selected ? ' selected' : ''}>${p}</option>`
    ).join('')}</optgroup>`
  ).join('');
}

// ── Read global settings ─────────────────────────────────────────────────────
function globals() {
  const balance  = Math.max(1, parseFloat(document.getElementById('gBalance').value)  || 10000);
  const risk     = Math.max(0, parseFloat(document.getElementById('gRisk').value)     || 2);
  const usdjpy   = Math.max(1, parseFloat(document.getElementById('gUSDJPY').value)   || 150);
  const cashRisk = balance * risk / 100;
  return { balance, risk, usdjpy, cashRisk };
}

// ── Pip configuration ────────────────────────────────────────────────────────
/**
 * Returns { pipSize, pipValue, note } for a given pair.
 *
 * Pip Value per standard lot (100,000 units):
 *   USD-quoted pairs (EUR/USD, GBP/USD, AUD/USD …)   → fixed $10.00
 *   USD-base non-JPY (USD/CAD, USD/CHF …)             → 10 / entryPrice
 *   All JPY crosses                                    → (0.01 / usdjpy) × 100,000
 *   XAU/USD (Gold)                                     → $1.00 per $0.10 pip
 */
function pipConfig(pair, entryPrice, usdjpy) {
  const p = pair.replace('/', '').toUpperCase();

  // ── Metals ──────────────────────────────────────────────────────────────
  if (p === 'XAUUSD') {
    return {
      pipSize:  0.10,
      pipValue: 1.00,
      note: 'Gold · pip = $0.10 · $1.00/pip per lot',
    };
  }
  if (p === 'XAGUSD') {
    return {
      pipSize:  0.01,
      pipValue: 0.50,
      note: 'Silver · pip = $0.01 · $0.50/pip per lot (5,000 oz)',
    };
  }

  // ── Indices ──────────────────────────────────────────────────────────────
  // Standard CFD contract: 1 lot = 1 unit; 1 point move = $1
  if (['US100','NAS100'].includes(p)) {
    return {
      pipSize:  0.25,          // NQ minimum tick = 0.25 points
      pipValue: 0.25,
      note: 'Nasdaq 100 · 1 pip = 0.25 pts · $0.25/pip (check broker contract)',
    };
  }
  if (p === 'US30') {
    return {
      pipSize:  1,
      pipValue: 1.00,
      note: 'Dow Jones 30 · 1 pip = 1 pt · $1.00/pip (check broker contract)',
    };
  }
  if (p === 'SP500') {
    return {
      pipSize:  0.25,
      pipValue: 0.25,
      note: 'S&P 500 · 1 pip = 0.25 pts · $0.25/pip (check broker contract)',
    };
  }
  if (['GER40','UK100','JP225','HK50'].includes(p)) {
    return {
      pipSize:  1,
      pipValue: 1.00,
      note: `${p} · 1 pip = 1 pt · $1.00/pip (check broker contract)`,
    };
  }

  // ── Crypto ──────────────────────────────────────────────────────────────
  if (p === 'BTCUSD' || p === 'BTCUSDT') {
    return {
      pipSize:  1.00,          // $1 move per pip
      pipValue: 1.00,
      note: 'Bitcoin · pip = $1.00 price move · $1.00/pip per lot',
    };
  }
  if (p === 'ETHUSD' || p === 'ETHUSDT') {
    return {
      pipSize:  0.10,          // $0.10 move per pip
      pipValue: 0.10,
      note: 'Ethereum · pip = $0.10 price move · $0.10/pip per lot',
    };
  }

  // ── Forex ──────────────────────────────────────────────────────────────
  if (p.includes('JPY')) {
    const pv = (0.01 / usdjpy) * 100_000;
    return {
      pipSize:  0.01,
      pipValue: pv,
      note: `JPY · pip = 0.01 · $${pv.toFixed(2)}/pip (USD/JPY ${usdjpy})`,
    };
  }

  // USD is the base currency (USD/CAD, USD/CHF, USD/SGD …)
  if (p.startsWith('USD')) {
    const price = entryPrice > 0 ? entryPrice : 1;
    const pv    = 10 / price;
    return {
      pipSize:  0.0001,
      pipValue: pv,
      note: `USD-base · pip = 0.0001 · $${pv.toFixed(2)}/pip (dynamic)`,
    };
  }

  // Default: USD is quote currency, or cross pair approximation
  return {
    pipSize:  0.0001,
    pipValue: 10.0,
    note: 'Standard · pip = 0.0001 · $10.00/pip',
  };
}

// ── Price decimal places per pair ────────────────────────────────────────────
function pairDecimals(pair) {
  const p = pair.replace('/', '').toUpperCase();
  if (p === 'XAUUSD' || p === 'XAGUSD') return 2;
  if (p.includes('JPY'))                 return 3;
  if (['US100','NAS100','US30','SP500','GER40'].includes(p)) return 2;
  if (p === 'BTCUSD' || p === 'BTCUSDT') return 2;
  if (p === 'ETHUSD' || p === 'ETHUSDT') return 2;
  return 5;
}

// ── Input mode switching ──────────────────────────────────────────────────────
function setInputMode(id, mode) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.dataset.inputMode = mode;

  // Button states
  card.querySelectorAll('.mode-btn').forEach(btn =>
    btn.classList.toggle('mode-active', btn.dataset.mode === mode));

  const slLbl  = document.getElementById(`sl-lbl-${id}`);
  const tpLbl  = document.getElementById(`tp-lbl-${id}`);
  const slIn   = card.querySelector('.c-sl');
  const tpIn   = card.querySelector('.c-tp');
  const dirTog = document.getElementById(`dir-toggle-${id}`);
  const hint   = document.getElementById(`mode-hint-${id}`);

  if (mode === 'price') {
    slLbl.textContent  = 'SL Price';
    tpLbl.textContent  = 'TP Price';
    slIn.placeholder   = 'e.g. 1.08200';
    tpIn.placeholder   = 'e.g. 1.09100';
    if (dirTog) dirTog.classList.add('hidden');
    if (hint)   hint.textContent = 'Enter SL/TP as price levels — pips auto-calculated';
    // Show pip badges, hide price badges
    const sp = document.getElementById(`sl-pips-${id}`);
    const tp_ = document.getElementById(`tp-pips-${id}`);
    const spr = document.getElementById(`sl-price-${id}`);
    const tpr = document.getElementById(`tp-price-${id}`);
    if (sp)  { sp.style.display  = ''; sp.textContent  = ''; }
    if (tp_) { tp_.style.display = ''; tp_.textContent = ''; }
    if (spr) { spr.style.display = 'none'; spr.textContent = ''; }
    if (tpr) { tpr.style.display = 'none'; tpr.textContent = ''; }
  } else {
    slLbl.textContent  = 'SL Pips';
    tpLbl.textContent  = 'TP Pips';
    slIn.placeholder   = 'e.g. 30';
    tpIn.placeholder   = 'e.g. 60';
    if (dirTog) dirTog.classList.remove('hidden');
    if (hint)   hint.textContent = 'Enter distance in pips — SL/TP price auto-calculated';
    // Default direction to LONG if none set
    if (!card.dataset.direction) setCardDir(id, 'long');
    const sp = document.getElementById(`sl-pips-${id}`);
    const tp_ = document.getElementById(`tp-pips-${id}`);
    const spr = document.getElementById(`sl-price-${id}`);
    const tpr = document.getElementById(`tp-price-${id}`);
    if (sp)  { sp.style.display  = 'none'; sp.textContent  = ''; }
    if (tp_) { tp_.style.display = 'none'; tp_.textContent = ''; }
    if (spr) { spr.style.display = 'block'; spr.textContent = ''; }
    if (tpr) { tpr.style.display = 'block'; tpr.textContent = ''; }
  }

  // Clear SL/TP values when switching mode
  slIn.value = '';
  tpIn.value = '';
  slIn.classList.remove('has-val');
  tpIn.classList.remove('has-val');
  calcSetup(id);
}

function setCardDir(id, dir) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.dataset.direction = dir;
  card.querySelectorAll('.dir-btn').forEach(btn => {
    btn.classList.remove('dir-active-long', 'dir-active-short');
    if (btn.dataset.dir === dir) btn.classList.add(`dir-active-${dir}`);
  });
  calcSetup(id);
}

// ── Core maths ───────────────────────────────────────────────────────────────
function calcSetup(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return null;

  const g      = globals();
  const pair   = card.querySelector('.c-pair').value;
  const mode   = card.dataset.inputMode || 'price';
  const dir    = card.dataset.direction  || 'long';
  const entry  = parseFloat(card.querySelector('.c-entry').value);
  const rawSL  = parseFloat(card.querySelector('.c-sl').value);
  const rawTP  = parseFloat(card.querySelector('.c-tp').value);

  const hasEntry = isFinite(entry) && entry > 0;

  // Always sync cash risk label
  card.querySelector('.c-cash-risk').textContent = `$${g.cashRisk.toFixed(2)}`;

  const { pipSize, pipValue, note } = pipConfig(pair, entry, g.usdjpy);
  const dec = pairDecimals(pair);

  // ── Resolve SL / TP prices based on mode ──
  let sl, tp;

  if (mode === 'pips') {
    // In pips mode: raw values are pip distances, convert to price
    const slPipsEntered = isFinite(rawSL) && rawSL > 0 ? rawSL : null;
    const tpPipsEntered = isFinite(rawTP) && rawTP > 0 ? rawTP : null;

    if (hasEntry && slPipsEntered !== null) {
      const offset = slPipsEntered * pipSize;
      sl = dir === 'long' ? entry - offset : entry + offset;
      // Show derived SL price
      const badge = document.getElementById(`sl-price-${id}`);
      if (badge) badge.textContent = `= ${sl.toFixed(dec)}`;
    }
    if (hasEntry && tpPipsEntered !== null) {
      const offset = tpPipsEntered * pipSize;
      tp = dir === 'long' ? entry + offset : entry - offset;
      const badge = document.getElementById(`tp-price-${id}`);
      if (badge) badge.textContent = `= ${tp.toFixed(dec)}`;
    }
    // Clear badges when empty
    if (!hasEntry || slPipsEntered === null) {
      const b = document.getElementById(`sl-price-${id}`);
      if (b) b.textContent = '';
    }
    if (!hasEntry || tpPipsEntered === null) {
      const b = document.getElementById(`tp-price-${id}`);
      if (b) b.textContent = '';
    }
  } else {
    // Price mode: raw values are prices already
    sl = isFinite(rawSL) && rawSL > 0 ? rawSL : NaN;
    tp = isFinite(rawTP) && rawTP > 0 ? rawTP : NaN;

    // Update live pip badges
    const slBadge = document.getElementById(`sl-pips-${id}`);
    const tpBadge = document.getElementById(`tp-pips-${id}`);
    if (slBadge) {
      if (hasEntry && isFinite(sl) && sl > 0) {
        const p = Math.abs(entry - sl) / pipSize;
        slBadge.textContent = `≈ ${p.toFixed(1)} pips`;
      } else {
        slBadge.textContent = '';
      }
    }
    if (tpBadge) {
      if (hasEntry && isFinite(tp) && tp > 0) {
        const p = Math.abs(tp - entry) / pipSize;
        tpBadge.textContent = `≈ ${p.toFixed(1)} pips`;
      } else {
        tpBadge.textContent = '';
      }
    }
  }

  const hasSL = isFinite(sl) && sl > 0;
  const hasTP = isFinite(tp) && tp > 0;

  if (!hasEntry || !hasSL) {
    applyOutputs(card, null);
    return null;
  }

  const slPips  = Math.abs(entry - sl) / pipSize;
  const tpPips  = hasTP ? Math.abs(tp - entry) / pipSize : null;
  const rr      = (tpPips !== null && slPips > 0) ? tpPips / slPips : null;
  const lotSize = slPips > 0 && pipValue > 0
                    ? g.cashRisk / (slPips * pipValue)
                    : null;

  // Infer direction (price mode: from prices; pips mode: from toggle)
  const direction = mode === 'pips'
    ? dir.toUpperCase()
    : (sl < entry ? 'LONG' : sl > entry ? 'SHORT' : null);

  // TP validity warning
  let warn = null;
  if (hasTP) {
    if (direction === 'LONG'  && tp <= entry) warn = 'TP should be above entry for LONG';
    if (direction === 'SHORT' && tp >= entry) warn = 'TP should be below entry for SHORT';
  }

  applyOutputs(card, { slPips, tpPips, rr, lotSize, direction, note, warn, cashRisk: g.cashRisk });
  return lotSize;
}

function applyOutputs(card, d) {
  const q   = s => card.querySelector(s);
  const slEl = q('.o-sl');
  const tpEl = q('.o-tp');
  const rrEl = q('.o-rr');
  const lotEl = q('.o-lot');
  const noteEl = q('.pip-note');
  const dirEl  = q('.dir-badge');
  const warnEl = q('.warn-area');

  if (!d) {
    slEl.textContent  = '—';
    tpEl.textContent  = '—';
    rrEl.textContent  = '—';
    lotEl.textContent = '—';
    if (noteEl) noteEl.textContent = '';
    if (warnEl) warnEl.innerHTML = '';
    if (dirEl)  { dirEl.textContent = '——'; dirEl.className = 'dir-badge dir-none'; }
    return;
  }

  slEl.textContent = d.slPips.toFixed(1);
  tpEl.textContent = d.tpPips !== null ? d.tpPips.toFixed(1) : '—';

  if (d.rr !== null) {
    rrEl.textContent = `1 : ${d.rr.toFixed(2)}`;
    rrEl.style.color = d.rr >= 2 ? '#00d68f' : d.rr >= 1 ? '#7c3aed' : '#f43f5e';
  } else {
    rrEl.textContent = '—';
    rrEl.style.color = '#8590b8';
  }

  if (d.lotSize !== null && d.lotSize > 0 && isFinite(d.lotSize)) {
    const prev = lotEl.textContent;
    const next = d.lotSize >= 0.01 ? d.lotSize.toFixed(2) : d.lotSize.toFixed(4);
    lotEl.textContent = next;
    if (prev !== next) {
      lotEl.classList.remove('lot-flash');
      void lotEl.offsetWidth;          // force reflow to restart animation
      lotEl.classList.add('lot-flash');
    }
  } else {
    lotEl.textContent = '—';
  }

  if (noteEl) noteEl.textContent = d.note;

  if (dirEl && d.direction) {
    dirEl.textContent = d.direction;
    dirEl.className   = `dir-badge dir-${d.direction.toLowerCase()}`;
  } else if (dirEl) {
    dirEl.textContent = '——';
    dirEl.className   = 'dir-badge dir-none';
  }

  if (warnEl) {
    warnEl.innerHTML = d.warn
      ? `<span class="warn-badge">⚠ ${d.warn}</span>`
      : '';
  }
}

// ── Recalculate every card ────────────────────────────────────────────────────
function recalcAll() {
  const g = globals();
  document.getElementById('gCashRisk').textContent = `$${g.cashRisk.toFixed(2)}`;
  document.getElementById('gRiskNote').textContent =
    `${g.risk.toFixed(2)}% of $${g.balance.toLocaleString()}`;

  let totalLots = 0, totalRisk = 0, validCount = 0;

  document.querySelectorAll('.setup-card').forEach(card => {
    const id  = card.dataset.setupId;
    const lot = calcSetup(id);
    if (lot !== null && lot > 0 && isFinite(lot)) {
      totalLots += lot;
      totalRisk += g.cashRisk;
      validCount++;
    }
  });

  const total = document.querySelectorAll('.setup-card').length;
  document.getElementById('setupCounter').textContent =
    total ? `(${total} setup${total > 1 ? 's' : ''})` : '';

  // Summary section
  const sumSec = document.getElementById('summarySection');
  if (total >= 2) {
    sumSec.style.display = 'block';
    document.getElementById('sumSetups').textContent = total;
    document.getElementById('sumLots').textContent   = totalLots.toFixed(2);
    document.getElementById('sumRisk').textContent   = `$${totalRisk.toFixed(2)}`;
    const pct = totalRisk / g.balance * 100;
    document.getElementById('sumPct').textContent  = `${pct.toFixed(2)}%`;
    const lvlEl = document.getElementById('sumLevel');
    if (pct > 10) {
      lvlEl.textContent = 'High Risk';
      lvlEl.style.color = '#f43f5e';
    } else if (pct > 5) {
      lvlEl.textContent = 'Moderate';
      lvlEl.style.color = '#ffa500';
    } else {
      lvlEl.textContent = 'Controlled';
      lvlEl.style.color = '#00d68f';
    }
  } else {
    sumSec.style.display = 'none';
  }

  // Empty state
  document.getElementById('emptyState').style.display  = total ? 'none'  : 'block';
  document.getElementById('setupsGrid').style.display   = total ? 'grid'  : 'none';
}

        <div class="input-mode-toggle">
          <button class="mode-btn mode-active" data-mode="price" onclick="setInputMode(${id},'price')">Price</button>
          <button class="mode-btn" data-mode="pips" onclick="setInputMode(${id},'pips')">Pips</button>
        </div>
        <div class="dir-toggle hidden" id="dir-toggle-${id}">
          <button class="dir-btn" data-dir="long" onclick="setCardDir(${id},'long')">Long ↑</button>
          <button class="dir-btn" data-dir="short" onclick="setCardDir(${id},'short')">Short ↓</button>
        </div>
        <span style="font-size:10px; color:#3a3b6a; font-style:italic;" id="mode-hint-${id}">
          Enter SL/TP as price levels — pips auto-calculated
        </span>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">

        <div>
          <label class="fx-lbl" for="entry-${id}">Entry Price</label>
          <input id="entry-${id}" type="number" class="fx-input c-entry"
                 placeholder="e.g. 1.08500" step="any" oninput="calcSetup(${id})"/>
        </div>

        <div>
          <label class="fx-lbl bear" for="sl-${id}" id="sl-lbl-${id}">SL Price</label>
          <input id="sl-${id}" type="number" class="fx-input c-sl sl-field"
                 placeholder="e.g. 1.08200" step="any"
                 oninput="this.classList.toggle('has-val',!!this.value); calcSetup(${id})"/>
          <!-- Live pip count (price mode) / derived price (pips mode) -->
          <div class="pips-badge bear" id="sl-pips-${id}"></div>
          <div class="price-badge" id="sl-price-${id}"></div>
        </div>

        <div>
          <label class="fx-lbl bull" for="tp-${id}" id="tp-lbl-${id}">TP Price</label>
          <input id="tp-${id}" type="number" class="fx-input c-tp tp-field"
                 placeholder="e.g. 1.09100" step="any"
                 oninput="this.classList.toggle('has-val',!!this.value); calcSetup(${id})"/>
          <div class="pips-badge bull" id="tp-pips-${id}"></div>
          <div class="price-badge" id="tp-price-${id}"></div>
        </div>
      </div>
    </div>

    <!-- ── Output stats ── -->
    <div style="padding:15px;">

      <!-- Four stat chips -->
      <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:14px;">

        <div style="background:#0f1024; border:1px solid #1e2040; border-radius:5px; padding:10px 12px;">
          <div class="fx-lbl">SL Pips</div>
          <div class="stat-val sl o-sl">—</div>
        </div>

        </div>

        <div style="background:#0f1024; border:1px solid #1e2040; border-radius:5px; padding:10px 12px;">
          <div class="fx-lbl">Risk : Reward</div>
          <div class="stat-val rr o-rr" style="font-size:15px;">—</div>
        </div>

        <div style="background:#0f1024; border:1px solid #1e2040; border-radius:5px; padding:10px 12px;">

            Standard lot = 100,000 units &nbsp;·&nbsp;

  `;

  requestAnimationFrame(() => {
    card.style.opacity   = '1';
    card.style.transform = 'translateY(0)';
  });

  setTimeout(() => calcSetup(id), 10);
  recalcAll();
}

function removeSetup(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.classList.add('card-removing');
  setTimeout(() => { card.remove(); recalcAll(); }, 200);
}

// ── Clock ────────────────────────────────────────────────────────────────────
function tickClock() {
  const now = new Date();
  const hh  = String(now.getUTCHours()).padStart(2,'0');
  const mm  = String(now.getUTCMinutes()).padStart(2,'0');
  const ss  = String(now.getUTCSeconds()).padStart(2,'0');
  document.getElementById('topClock').textContent = `${hh}:${mm}:${ss} UTC`;
}
setInterval(tickClock, 1000);
tickClock();
