<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KofiFX Terminal</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<!-- ═══════════════  TOP BAR  ══════════════════════════════════════════════ -->
<header class="top-bar">
  <div class="top-bar__brand">
    <svg class="brand-icon" viewBox="0 0 24 24" fill="none">
      <polyline points="2,18 8,10 13,14 22,4" stroke="#7c3aed" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="16,4 22,4 22,10"       stroke="#7c3aed" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="brand-name">KofiFX <span class="brand-accent">Terminal</span></span>
  </div>

  <!-- Chart count -->
  <div class="top-bar__controls">
    <span class="controls-label">Charts</span>
    <div class="chart-count-btns" id="chartCountBtns">
      <button class="count-btn" data-count="1">1</button>
      <button class="count-btn" data-count="2">2</button>
      <button class="count-btn active" data-count="4">4</button>
      <button class="count-btn" data-count="6">6</button>
      <button class="count-btn" data-count="8">8</button>
    </div>
  </div>

  <!-- ── Drawing tools ── -->
  <div class="top-bar__drawing" id="drawingToolbar">
    <span class="controls-label">Draw</span>
    <div class="draw-btns">
      <button class="draw-btn active" data-tool="select"   title="Select / Pan">
        <svg viewBox="0 0 16 16" fill="none"><path d="M4 2l8 6-4 1-2 4z" fill="currentColor"/></svg>
      </button>
      <button class="draw-btn" data-tool="hline"     title="Horizontal Line">
        <svg viewBox="0 0 16 16" fill="none"><line x1="1" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.8"/></svg>
      </button>
      <button class="draw-btn" data-tool="trendline" title="Trend Line">
        <svg viewBox="0 0 16 16" fill="none"><line x1="2" y1="13" x2="14" y2="3" stroke="currentColor" stroke-width="1.8"/><circle cx="2"  cy="13" r="1.5" fill="currentColor"/><circle cx="14" cy="3"  r="1.5" fill="currentColor"/></svg>
      </button>
      <button class="draw-btn" data-tool="rect"      title="Rectangle / Box">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="8" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
      </button>
      <button class="draw-btn" data-tool="longpos"   title="Long Position">
        <svg viewBox="0 0 16 16" fill="none"><polyline points="8,14 8,3 13,7" stroke="#26a69a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="draw-btn" data-tool="shortpos"  title="Short Position">
        <svg viewBox="0 0 16 16" fill="none"><polyline points="8,2 8,13 3,9" stroke="#ef5350" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="draw-btn" data-tool="eraser"    title="Erase Drawing">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="8" width="10" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="8" x2="3" y2="13" stroke="currentColor" stroke-width="1.4"/><line x1="12" y1="3" x2="2" y2="13" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
      <button class="draw-btn draw-btn--clear" data-tool="clear" title="Clear all drawings">
        <svg viewBox="0 0 16 16" fill="none"><line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="1.8"/><line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="1.8"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Date navigator ── -->
  <div class="top-bar__datenav">
    <span class="controls-label">Go to</span>
    <input type="date" id="globalDateInput" class="date-input-global"/>
    <button id="globalGoBtn" class="date-go-btn">Go</button>
  </div>

  <!-- ── Tools nav ── -->
  <div class="top-bar__tools">
    <a href="/macro" class="tools-link" title="Macro Intelligence Dashboard">
      <svg viewBox="0 0 16 16" fill="none" width="13" height="13">
        <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 4v4l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Macro
    </a>
    <a href="/position-sizing" class="tools-link" title="Position Sizing &amp; Risk Dashboard">
      <svg viewBox="0 0 16 16" fill="none" width="13" height="13">
        <rect x="1" y="9" width="3" height="6" fill="currentColor" rx="0.5"/>
        <rect x="6" y="5" width="3" height="10" fill="currentColor" rx="0.5"/>
        <rect x="11" y="1" width="3" height="14" fill="currentColor" rx="0.5"/>
      </svg>
      Position Sizing
    </a>
    <a href="/journal" class="tools-link" title="Trading Journal">
      <svg viewBox="0 0 16 16" fill="none" width="13" height="13">
        <rect x="2" y="1" width="12" height="14" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="5" y1="5" x2="11" y2="5" stroke="currentColor" stroke-width="1.3"/>
        <line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.3"/>
        <line x1="5" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      Journal
    </a>
  </div>

  <!-- Clock + connection -->
  <div class="top-bar__status">
    <span class="market-clock" id="marketClock">--:--:-- UTC</span>
    <div class="conn-indicator">
      <span class="conn-dot" id="connDot"></span>
      <span class="conn-label" id="connLabel">Connecting</span>
    </div>
  </div>
</header>

<!-- ═══════════════  CHART GRID  ═══════════════════════════════════════════ -->
<main class="chart-grid grid-4" id="chartGrid"></main>

<!-- ═══════════════  PANE TEMPLATE  ════════════════════════════════════════ -->
<template id="paneTpl">
  <div class="chart-pane" data-pane-id="">

    <div class="pane-toolbar">
      <div class="pane-toolbar__left">
        <select class="pane-select symbol-select" aria-label="Symbol"></select>
        <select class="pane-select tf-select" aria-label="Timeframe">
          <option value="1m">1m</option>
          <option value="5m">5m</option>
          <option value="15m">15m</option>
          <option value="30m">30m</option>
          <option value="1h" selected>1h</option>
          <option value="4h">4h</option>
          <option value="1d">1d</option>
          <option value="1w">1w</option>
        </select>
      </div>

      <div class="pane-ticker">
        <span class="ticker-symbol"></span>
        <span class="ticker-price">--</span>
        <span class="ticker-change">--</span>
        <span class="ticker-pct">--</span>
      </div>

      <div class="pane-toolbar__right">
        <!-- Add indicator -->
        <button class="pane-btn pane-btn--add-ind" title="Add indicator" aria-label="Indicators">
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M2 12 L5 7 L8 9 L11 4 L14 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="12" y1="2" x2="12" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="10" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <!-- KofiNoWick settings -->
        <button class="pane-btn pane-btn--indicator knw-active" title="KofiNoWick settings" aria-label="KofiNoWick">
          <svg viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M11.53 4.47l1.42-1.42M3.05 12.95l1.42-1.42" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
        <!-- Chart style / colours -->
        <button class="pane-btn pane-btn--style" title="Chart style &amp; colours">
          <svg viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="5.5" cy="6" r="1.2" fill="#26a69a"/>
            <circle cx="10.5" cy="6" r="1.2" fill="#ef5350"/>
            <circle cx="8" cy="10.5" r="1.2" fill="currentColor"/>
          </svg>
        </button>
        <!-- Chart type -->
        <button class="pane-btn pane-btn--chart-type" title="Toggle chart type" data-type="candle">
          <svg viewBox="0 0 16 16" fill="none">
            <rect x="2"  y="5"  width="3" height="6" fill="currentColor" rx="0.5"/>
            <line x1="3.5" y1="2" x2="3.5" y2="5"   stroke="currentColor" stroke-width="1.5"/>
            <line x1="3.5" y1="11" x2="3.5" y2="14" stroke="currentColor" stroke-width="1.5"/>
            <rect x="7"  y="3"  width="3" height="8" fill="currentColor" rx="0.5"/>
            <line x1="8.5" y1="1"  x2="8.5" y2="3"  stroke="currentColor" stroke-width="1.5"/>
            <line x1="8.5" y1="11" x2="8.5" y2="15" stroke="currentColor" stroke-width="1.5"/>
            <rect x="12" y="6"  width="3" height="5" fill="currentColor" rx="0.5"/>
            <line x1="13.5" y1="3"  x2="13.5" y2="6"  stroke="currentColor" stroke-width="1.5"/>
            <line x1="13.5" y1="11" x2="13.5" y2="13" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
        <!-- Refresh -->
        <button class="pane-btn pane-btn--refresh" title="Reload chart">
          <svg viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.06-3.41L9 7h6V1l-1.35 1.35Z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>

    <!-- Indicator chips bar (hidden when empty) -->
    <div class="indicator-chips hidden"></div>

    <!-- Per-pane date navigator -->
    <div class="pane-date-nav">
      <input type="date" class="date-nav-input" title="Jump to date"/>
      <button class="date-nav-go">Go</button>
    </div>

    <!-- Indicator dropdown menu -->
    <div class="ind-menu hidden">
      <div class="ind-menu-section">Moving Averages</div>
      <button class="ind-item" data-ind="sma" data-period="20">SMA 20</button>
      <button class="ind-item" data-ind="sma" data-period="50">SMA 50</button>
      <button class="ind-item" data-ind="sma" data-period="200">SMA 200</button>
      <button class="ind-item" data-ind="ema" data-period="9">EMA 9</button>
      <button class="ind-item" data-ind="ema" data-period="21">EMA 21</button>
      <button class="ind-item" data-ind="ema" data-period="50">EMA 50</button>
      <div class="ind-menu-section">Bands &amp; Overlays</div>
      <button class="ind-item" data-ind="bb"   data-period="20" data-std="2">Bollinger Bands (20,2)</button>
      <button class="ind-item" data-ind="vwap">VWAP</button>
      <div class="ind-menu-section">Oscillators</div>
      <button class="ind-item" data-ind="rsi"  data-period="14">RSI (14)</button>
      <button class="ind-item" data-ind="macd">MACD (12,26,9)</button>
    </div>

    <div class="chart-container"></div>
    <div class="pane-loading"><div class="spinner"></div><span>Loading…</span></div>
    <div class="pane-error hidden">Failed to load. <button class="retry-btn">Retry</button></div>
  </div>
</template>

<!-- ═══════════════  SCRIPTS  ══════════════════════════════════════════════ -->
<script>
  window.KOFIFX = {
    symbols:    {{ symbols | tojson }},
    timeframes: {{ timeframes | tojson }},
  };
</script>
<script src="/static/js/hyperliquid.js"></script>
<script src="/static/js/kofi_nowick.js"></script>
<script src="/static/js/indicators.js"></script>
<script src="/static/js/drawing_tools.js"></script>
<script src="/static/js/chart_pane.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
